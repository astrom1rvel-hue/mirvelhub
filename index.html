<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRVEL HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-dark: #050508; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-5px) scale(1.02); border-color: rgba(139, 92, 246, 0.5); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-black to-black">

    <nav class="w-64 p-8 flex flex-col gap-6 border-r border-white/5">
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 italic">MIRVEL HUB</h1>
        <div class="flex flex-col gap-2">
            <button onclick="showPage('home')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">🏠 Главная</button>
            <button onclick="showPage('cds')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">💿 CD Коллекция</button>
            <button onclick="showPage('vinyls')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">💽 Винил</button>
            <button onclick="showPage('profile')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">👤 Профиль</button>
        </div>
    </nav>

    <main class="flex-1 p-10 overflow-y-auto">
        <section id="home" class="fade-in">
            <div class="glass p-10 rounded-3xl mb-10 glow flex justify-between items-center">
                <div>
                    <h2 class="text-5xl font-black mb-4">Привет, <span id="display-name" class="text-cyan-400">Коллекционер</span>!</h2>
                    <p class="text-gray-400">Уровень: <span id="user-lvl" class="text-purple-400 font-bold">1</span></p>
                </div>
                <img id="main-avatar" class="w-24 h-24 rounded-full border-4 border-purple-500/30 object-cover hidden">
            </div>
            <div class="mb-10">
                <h3 class="text-2xl font-bold mb-6">Любимые артисты</h3>
                <div id="artist-list" class="flex flex-wrap gap-3 mb-6"></div>
                <div class="flex gap-2 max-w-sm">
                    <input id="artist-input" placeholder="Введите имя артиста..." class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-purple-500">
                    <button onclick="addArtist()" class="bg-purple-600 px-8 rounded-2xl font-bold hover:bg-purple-500 transition-all">Добавить</button>
                </div>
            </div>
        </section>

        <section id="cds" class="hidden fade-in">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-bold">CD Коллекция</h2>
                <button onclick="openModal('cd')" class="bg-white text-black px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">+ Новый CD</button>
            </div>
            <div id="cd-grid" class="grid grid-cols-4 gap-6"></div>
        </section>

        <section id="vinyls" class="hidden fade-in">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-bold">Винил</h2>
                <button onclick="openModal('vinyl')" class="bg-white text-black px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">+ Новая пластинка</button>
            </div>
            <div id="vinyl-grid" class="grid grid-cols-4 gap-6"></div>
        </section>

        <section id="profile" class="hidden fade-in">
            <h2 class="text-4xl font-bold mb-10">Настройки</h2>
            <div class="glass p-8 rounded-3xl max-w-lg space-y-6">
                <div>
                    <label class="block text-xs text-gray-500 mb-2">АВАТАР</label>
                    <input type="file" onchange="uploadAvatar(event)" class="w-full bg-white/5 p-4 rounded-xl border border-white/10">
                    <img id="profile-preview" class="w-20 h-20 rounded-full mt-4 hidden object-cover">
                </div>
                <input id="profile-name" placeholder="Ваш никнейм" class="w-full bg-white/5 p-4 rounded-xl border border-white/10">
                <button id="save-profile-btn" onclick="saveProfile()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold hover:bg-cyan-500 transition-all">Сохранить профиль</button>
                
                <div class="pt-6 border-t border-white/10 space-y-4">
                    <button onclick="exportData()" class="w-full bg-purple-600 py-4 rounded-xl font-bold hover:bg-purple-500 transition-all">Экспорт бэкапа</button>
                    <input type="file" onchange="importData(event)" class="w-full bg-white/5 p-4 rounded-xl border border-dashed border-white/10">
                </div>
            </div>
        </section>
    </main>

    <script>
        let data = JSON.parse(localStorage.getItem('mirvel_data')) || { cds: [], vinyls: [], name: 'Коллекционер', artists: [], avatar: '' };

        function save() { localStorage.setItem('mirvel_data', JSON.stringify(data)); updateUI(); }

        window.updateUI = () => {
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('profile-name').value = data.name;
            
            // Avatar Update Logic
            const avatarElems = [document.getElementById('main-avatar'), document.getElementById('profile-preview')];
            avatarElems.forEach(el => {
                if(data.avatar) { el.src = data.avatar; el.classList.remove('hidden'); }
            });

            const renderGrid = (key, id) => {
                const container = document.getElementById(id);
                container.innerHTML = data[key].map(i => `
                    <div class="glass p-6 rounded-3xl card-hover relative group">
                        <div class="w-full h-40 bg-white/5 rounded-2xl mb-4 overflow-hidden">
                            ${i.img ? `<img src="${i.img}" class="w-full h-full object-cover" style="object-position: ${i.pos || 'center'}">` : ''}
                        </div>
                        <h3 class="font-bold text-lg">${i.title}</h3>
                        <p class="text-cyan-400 font-mono mb-4">${i.price} ₴</p>
                        <div class="flex gap-2">
                            <button onclick="deleteItem('${key.slice(0,-1)}', ${i.id})" class="text-xs bg-red-500/20 text-red-400 px-3 py-1 rounded hover:bg-red-500/40">🗑️</button>
                            <button onclick="changePos('${key.slice(0,-1)}', ${i.id})" class="text-xs bg-white/10 px-3 py-1 rounded hover:bg-white/20">🖼️</button>
                        </div>
                    </div>
                `).join('');
            };
            renderGrid('cds', 'cd-grid');
            renderGrid('vinyls', 'vinyl-grid');
            renderArtists();
        };

        window.changePos = (type, id) => {
            const item = data[type+'s'].find(i => i.id === id);
            const pos = ['center', 'top', 'bottom'];
            const curIdx = pos.indexOf(item.pos || 'center');
            item.pos = pos[(curIdx + 1) % pos.length];
            save();
        };

        window.showPage = (id) => document.querySelectorAll('main > section').forEach(s => s.classList.toggle('hidden', s.id !== id));
        
        window.saveProfile = () => {
            data.name = document.getElementById('profile-name').value;
            save();
            const btn = document.getElementById('save-profile-btn');
            btn.innerText = 'Сохранено! ✅';
            setTimeout(() => btn.innerText = 'Сохранить профиль', 2000);
        };

        window.uploadAvatar = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { data.avatar = ev.target.result; save(); };
            reader.readAsDataURL(e.target.files[0]);
        };

        window.addArtist = () => { const val = document.getElementById('artist-input').value; if(val) { data.artists.push(val); save(); renderArtists(); document.getElementById('artist-input').value = ''; } };
        window.renderArtists = () => document.getElementById('artist-list').innerHTML = data.artists.map((a, i) => `<span class="bg-purple-600/30 px-4 py-2 rounded-2xl text-sm">${a} <button onclick="data.artists.splice(${i},1); save();" class="ml-2 opacity-50 hover:opacity-100">×</button></span>`).join('');

        window.openModal = (type) => { document.getElementById('edit-type').value = type; document.getElementById('modal').classList.remove('hidden'); };
        
        window.saveItem = () => {
            const type = document.getElementById('edit-type').value;
            const title = document.getElementById('item-title').value;
            const price = parseFloat(document.getElementById('item-price').value) || 0;
            const file = document.getElementById('item-img').files[0];
            const finalize = (img) => { data[type + 's'].push({ id: Date.now(), title, price, img, pos: 'center' }); save(); document.getElementById('modal').classList.add('hidden'); };
            if(file) { const reader = new FileReader(); reader.onload = (e) => finalize(e.target.result); reader.readAsDataURL(file); } else finalize('');
        };

        window.deleteItem = (type, id) => { data[type + 's'] = data[type + 's'].filter(i => i.id !== id); save(); };
        window.exportData = () => { const a = document.createElement('a'); a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data)); a.download = 'backup.json'; a.click(); };
        window.importData = (e) => { const reader = new FileReader(); reader.onload = (ev) => { data = JSON.parse(ev.target.result); save(); }; reader.readAsText(e.target.files[0]); };

        updateUI();
    </script>
</body>
</html>
