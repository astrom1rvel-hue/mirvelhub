<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRVEL HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-dark: #050508; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-5px) scale(1.02); border-color: rgba(139, 92, 246, 0.5); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-black to-black">

    <nav class="w-64 p-8 flex flex-col gap-6 border-r border-white/5">
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 italic">MIRVEL HUB</h1>
        <div class="flex flex-col gap-2">
            <button onclick="showPage('home')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">🏠 Главная</button>
            <button onclick="showPage('cds')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">💿 CD Коллекция</button>
            <button onclick="showPage('vinyls')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">💽 Винил</button>
            <button onclick="showPage('wishlists')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">🎁 Желаемое</button>
            <button onclick="showPage('profile')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">👤 Профиль</button>
        </div>
    </nav>

    <main class="flex-1 p-10 overflow-y-auto">
        <section id="home" class="fade-in">
            <div class="glass p-10 rounded-3xl mb-10 flex justify-between items-center">
                <div>
                    <h2 class="text-5xl font-black mb-4">Привет, <span id="display-name" class="text-cyan-400">Коллекционер</span>!</h2>
                    <p id="display-desc" class="text-gray-500 mb-2 italic"></p>
                    <p class="text-gray-400 text-sm mb-6">Любимые: <span id="display-artists" class="text-purple-300"></span></p>
                    <p class="text-gray-400 text-lg">Уровень: <span id="user-lvl" class="text-purple-400 font-bold">1</span> | XP: <span id="user-xp" class="text-cyan-400 font-bold">0</span></p>
                </div>
                <img id="main-avatar" class="w-24 h-24 rounded-full border-4 border-purple-500/30 object-cover hidden">
            </div>

            <div class="grid grid-cols-2 gap-6 mb-10">
                <div class="glass p-8 rounded-3xl"><p class="text-gray-500 text-sm">Коллекция (CD + Винил)</p><h3 class="text-3xl font-black mt-2 text-purple-400" id="stat-col-val">0 ₴</h3></div>
                <div class="glass p-8 rounded-3xl"><p class="text-gray-500 text-sm">Желаемое</p><h3 class="text-3xl font-black mt-2 text-cyan-400" id="stat-wish-val">0 ₴</h3></div>
            </div>
        </section>

        <section id="cds" class="hidden fade-in"><div class="flex justify-between items-center mb-10"><div><h2 class="text-4xl font-bold">CD Коллекция</h2><p class="text-gray-500">Сумма: <span id="total-cds">0</span> ₴</p></div><button onclick="openModal('cds')" class="bg-white text-black px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">+ Новый CD</button></div><div id="cd-grid" class="grid grid-cols-4 gap-6"></div></section>
        <section id="vinyls" class="hidden fade-in"><div class="flex justify-between items-center mb-10"><div><h2 class="text-4xl font-bold">Винил</h2><p class="text-gray-500">Сумма: <span id="total-vinyls">0</span> ₴</p></div><button onclick="openModal('vinyls')" class="bg-white text-black px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">+ Новая пластинка</button></div><div id="vinyl-grid" class="grid grid-cols-4 gap-6"></div></section>
        
        <section id="wishlists" class="hidden fade-in">
            <div class="flex justify-between items-center mb-10">
                <div><h2 class="text-4xl font-bold">Желаемое</h2><p class="text-gray-500">Сумма: <span id="total-wishlists">0</span> ₴</p></div>
                <div class="flex gap-2">
                    <button onclick="openTagsManager()" class="bg-white/10 text-white px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">Тэги</button>
                    <button onclick="openModal('wishlists')" class="bg-white text-black px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">+ Добавить</button>
                </div>
            </div>
            <div id="filter-bar" class="flex flex-wrap gap-2 mb-6 p-4 glass rounded-2xl">
                <span class="text-sm text-gray-500 self-center mr-2">Фильтр:</span>
                <button onclick="setFilter(null)" class="px-3 py-1 rounded-full border border-white/10 text-xs bg-white/5 hover:bg-white/10">Все</button>
                <div id="filter-tags" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="wishlist-grid" class="grid grid-cols-4 gap-6"></div>
        </section>

        <section id="profile" class="hidden fade-in">
            <h2 class="text-4xl font-bold mb-10">Настройки и Бэкапы</h2>
            <div class="glass p-8 rounded-3xl max-w-lg space-y-6">
                <button onclick="document.getElementById('avatar-input').click()" class="w-full bg-white/10 py-4 rounded-xl font-bold text-white hover:bg-white/20 transition">Выбрать аватар</button>
                <input type="file" id="avatar-input" accept="image/*" onchange="processImage(event, 'avatar')" class="hidden">
                <input id="profile-name" placeholder="Никнейм" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white">
                <textarea id="profile-desc" placeholder="Описание" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white h-24"></textarea>
                <textarea id="profile-artists" placeholder="Любимые исполнители" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white h-24"></textarea>
                <button onclick="saveProfile()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold hover:bg-cyan-500 transition-all">Сохранить</button>
                <button onclick="exportData()" class="w-full bg-purple-600 py-4 rounded-xl font-bold">Экспорт данных (JSON)</button>
                <input type="file" id="import-file" onchange="importData(event)" accept=".json" class="hidden">
                <button onclick="document.getElementById('import-file').click()" class="w-full bg-white/10 py-4 rounded-xl font-bold">Импорт (.json)</button>
            </div>
        </section>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
        <div class="glass p-10 rounded-3xl w-96 space-y-4 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-bold">Редактор</h2>
            <input type="hidden" id="edit-type"><input type="hidden" id="edit-id">
            <input id="item-title" placeholder="Название" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white">
            <input id="item-price" type="number" placeholder="Цена (₴)" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white">
            <input id="item-url" placeholder="Ссылка (URL)" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white hidden">
            <div id="gift-container" class="flex items-center gap-2"><input type="checkbox" id="item-gift"> <label>Подарок 🎁</label></div>
            <div id="tags-selector" class="hidden space-y-2"><div class="text-sm text-gray-400">Выберите теги:</div><div id="available-tags-list" class="flex flex-wrap gap-2"></div></div>
            <input type="file" id="item-img" accept="image/*" class="w-full text-sm p-2 bg-white/5 rounded-xl border border-white/10">
            <button onclick="saveItem()" class="w-full bg-purple-600 py-4 rounded-xl font-bold">Сохранить</button>
            <button onclick="closeModal('modal')" class="w-full bg-white/10 py-4 rounded-xl">Отмена</button>
        </div>
    </div>

    <div id="tags-manager-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
        <div class="glass p-10 rounded-3xl w-96 space-y-4 shadow-2xl"><h2 class="text-2xl font-bold">Управление тегами</h2><div id="manage-tags-list" class="space-y-2"></div><div class="flex gap-2 pt-4"><input id="new-tag-text" placeholder="Новый тег" class="flex-1 bg-white/5 p-2 rounded-lg text-sm"><input type="color" id="new-tag-color" class="w-8 h-8"><button onclick="addGlobalTag()" class="bg-white/10 px-3 rounded-lg">+</button></div><button onclick="closeModal('tags-manager-modal')" class="w-full bg-white/10 py-4 rounded-xl mt-4">Закрыть</button></div>
    </div>
    <div id="note-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
        <div class="glass p-10 rounded-3xl w-96 space-y-4 shadow-2xl"><h2 class="text-2xl font-bold">Примечание</h2><textarea id="note-text" class="w-full h-32 bg-white/5 p-4 rounded-xl border border-white/10 text-white"></textarea><button onclick="saveNote()" class="w-full bg-purple-600 py-4 rounded-xl font-bold">Сохранить</button><button onclick="closeModal('note-modal')" class="w-full bg-white/10 py-4 rounded-xl">Закрыть</button></div>
    </div>
    <div id="quick-notes-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
        <div class="glass p-8 rounded-3xl w-96 max-h-[80vh] flex flex-col space-y-4 shadow-2xl"><h2 class="text-2xl font-bold">Быстрые заметки</h2><div id="quick-notes-list" class="flex-1 overflow-y-auto space-y-2"></div><div class="flex gap-2"><input id="new-quick-note" class="flex-1 bg-white/5 p-3 rounded-xl border border-white/10" placeholder="Заметка..."> <button onclick="saveQuickNote()" class="bg-purple-600 px-4 py-3 rounded-xl font-bold">+</button></div><button onclick="closeModal('quick-notes-modal')" class="w-full bg-white/10 py-3 rounded-xl mt-2">Закрыть</button></div>
    </div>

    <button onclick="document.getElementById('quick-notes-modal').classList.remove('hidden')" class="fixed bottom-8 right-8 w-16 h-16 bg-purple-600 rounded-full shadow-2xl text-3xl z-40 hover:scale-110 transition-transform">📝</button>

    <script>
        const defaults = { cds: [], vinyls: [], wishlists: [], availableTags: [], name: 'Коллекционер', description: '', favoriteArtists: '', xp: 0, avatar: '', quickNotes: [] };
        let data = JSON.parse(localStorage.getItem('mirvel_data')) || { ...defaults };
        data = { ...defaults, ...data };
        let tempTags = []; let tempImg = ''; let currentFilter = null; let editingNoteId = null;

        function save() { localStorage.setItem('mirvel_data', JSON.stringify(data)); updateUI(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showPage(id) { document.querySelectorAll('main > section').forEach(s => s.classList.toggle('hidden', s.id !== id)); }
        
        window.cyclePos = (type, id) => {
            const item = data[type].find(x => x.id === id);
            if (!item) return;
            const positions = ['center', 'top', 'bottom'];
            const currentIdx = positions.indexOf(item.imgPos || 'center');
            item.imgPos = positions[(currentIdx + 1) % positions.length];
            save();
        };

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'mirvel_backup.json'; a.click();
        };

        window.importData = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { try { data = { ...defaults, ...JSON.parse(ev.target.result) }; save(); } catch(err) { alert('Ошибка'); } };
            reader.readAsText(file);
        };

        async function processImage(e, target) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const max = 600;
                    const scale = Math.min(1, max / Math.max(img.width, img.height));
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    if (target === 'avatar') { data.avatar = base64; save(); } else { tempImg = base64; }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.openModal = (type, id = null) => {
            document.getElementById('edit-type').value = type; document.getElementById('edit-id').value = id || '';
            document.getElementById('item-url').classList.toggle('hidden', type !== 'wishlists');
            document.getElementById('gift-container').classList.toggle('hidden', type === 'wishlists');
            document.getElementById('tags-selector').classList.toggle('hidden', type !== 'wishlists');
            document.getElementById('item-img').value = ''; tempImg = ''; tempTags = [];
            
            if(id) {
                const item = data[type].find(x => x.id === parseInt(id));
                document.getElementById('item-title').value = item.title;
                document.getElementById('item-price').value = item.price;
                document.getElementById('item-url').value = item.url || '';
                document.getElementById('item-gift').checked = !!item.isGift;
                tempTags = item.tags || [];
            } else {
                document.getElementById('item-title').value = ''; document.getElementById('item-price').value = '';
                document.getElementById('item-url').value = ''; document.getElementById('item-gift').checked = false;
            }
            renderModalTags();
            document.getElementById('modal').classList.remove('hidden');
        };

        window.saveItem = async () => {
            const type = document.getElementById('edit-type').value;
            const idStr = document.getElementById('edit-id').value;
            const fileInput = document.getElementById('item-img');
            if (fileInput.files[0]) await processImage({target: fileInput}, 'item');
            
            const title = document.getElementById('item-title').value;
            const price = parseFloat(document.getElementById('item-price').value) || 0;
            const url = document.getElementById('item-url').value;
            const isGift = document.getElementById('item-gift').checked;
            
            if(idStr) {
                const item = data[type].find(x => x.id === parseInt(idStr));
                Object.assign(item, { title, price, url, isGift, tags: [...tempTags], img: tempImg || item.img });
            } else {
                data[type].push({ id: Date.now(), title, price, url, isGift, tags: [...tempTags], img: tempImg, imgPos: 'center', note: '' });
            }
            data.xp = Math.floor((data.cds.reduce((s, i) => s + i.price, 0) + data.vinyls.reduce((s, i) => s + i.price, 0)) / 10);
            save(); closeModal('modal');
        };

        window.openTagsManager = () => { renderManageTagsList(); document.getElementById('tags-manager-modal').classList.remove('hidden'); };
        window.renderManageTagsList = () => {
            document.getElementById('manage-tags-list').innerHTML = data.availableTags.map(t => `
                <div class="flex justify-between items-center p-2 rounded-lg bg-white/5"><span class="px-2 py-1 rounded text-xs" style="background-color: ${t.color}">${t.text}</span><button onclick="deleteTag('${t.text}')" class="text-red-500">✕</button></div>
            `).join('');
        };
        window.addGlobalTag = () => {
            const text = document.getElementById('new-tag-text').value; const color = document.getElementById('new-tag-color').value;
            if(!text) return; data.availableTags.push({ text, color }); renderManageTagsList(); renderModalTags(); save();
        };
        window.deleteTag = (text) => {
            data.availableTags = data.availableTags.filter(t => t.text !== text);
            data.wishlists.forEach(item => { if(item.tags) item.tags = item.tags.filter(t => t.text !== text); });
            save(); renderManageTagsList(); updateUI();
        };
        window.toggleTag = (tag) => {
            const idx = tempTags.findIndex(t => t.text === tag.text);
            if(idx > -1) tempTags.splice(idx, 1); else tempTags.push(tag); renderModalTags();
        };
        window.renderModalTags = () => {
            document.getElementById('available-tags-list').innerHTML = data.availableTags.map(t => `
                <button type="button" onclick='toggleTag(${JSON.stringify(t)})' class="px-2 py-1 rounded text-xs border ${tempTags.find(x => x.text === t.text) ? 'opacity-100 ring-2 ring-white' : 'opacity-40'}" style="background-color: ${t.color}">${t.text}</button>
            `).join('');
        };

        window.openNote = (type, id) => {
            document.getElementById('note-text').dataset.type = type;
            document.getElementById('note-text').dataset.id = id;
            document.getElementById('note-text').value = data[type].find(x => x.id === id).note || '';
            document.getElementById('note-modal').classList.remove('hidden');
        };
        window.saveNote = () => {
            const type = document.getElementById('note-text').dataset.type;
            const id = parseInt(document.getElementById('note-text').dataset.id);
            data[type].find(x => x.id === id).note = document.getElementById('note-text').value;
            save(); closeModal('note-modal');
        };

        window.saveQuickNote = () => {
            const val = document.getElementById('new-quick-note').value;
            if(!val) return;
            if (editingNoteId) { data.quickNotes.find(n => n.id === editingNoteId).text = val; editingNoteId = null; }
            else { data.quickNotes.push({ id: Date.now(), text: val }); }
            document.getElementById('new-quick-note').value = ''; save(); renderQuickNotes();
        };
        window.editQuickNote = (id) => { editingNoteId = id; document.getElementById('new-quick-note').value = data.quickNotes.find(n => n.id === id).text; };
        window.deleteQuickNote = (id) => { data.quickNotes = data.quickNotes.filter(n => n.id !== id); save(); renderQuickNotes(); };
        window.renderQuickNotes = () => {
            document.getElementById('quick-notes-list').innerHTML = data.quickNotes.map(n => `
                <div class="bg-white/5 p-3 rounded-xl text-sm flex justify-between items-start gap-2">
                    <span class="break-words w-full text-gray-200">${n.text}</span>
                    <div class="flex gap-1 shrink-0"><button onclick="editQuickNote(${n.id})" class="text-gray-400">✏️</button><button onclick="deleteQuickNote(${n.id})" class="text-red-400">✕</button></div>
                </div>
            `).join('');
        };

        window.setFilter = (tagText) => { currentFilter = tagText; updateUI(); };
        window.saveProfile = () => { 
            data.name = document.getElementById('profile-name').value; 
            data.description = document.getElementById('profile-desc').value; 
            data.favoriteArtists = document.getElementById('profile-artists').value; 
            save(); 
        };

        function updateUI() {
            const cdsVal = (data.cds || []).reduce((s, i) => s + i.price, 0);
            const vinylsVal = (data.vinyls || []).reduce((s, i) => s + i.price, 0);
            const wishVal = (data.wishlists || []).reduce((s, i) => s + i.price, 0);
            
            document.getElementById('display-name').innerText = data.name || 'Коллекционер';
            document.getElementById('display-desc').innerText = data.description || '';
            document.getElementById('display-artists').innerText = data.favoriteArtists || '-';
            document.getElementById('profile-name').value = data.name || '';
            document.getElementById('profile-desc').value = data.description || '';
            document.getElementById('profile-artists').value = data.favoriteArtists || '';
            document.getElementById('user-xp').innerText = data.xp || 0;
            document.getElementById('user-lvl').innerText = Math.floor((data.xp || 0) / 500) + 1;
            document.getElementById('stat-col-val').innerText = (cdsVal + vinylsVal) + ' ₴';
            document.getElementById('stat-wish-val').innerText = wishVal + ' ₴';
            document.getElementById('total-cds').innerText = cdsVal;
            document.getElementById('total-vinyls').innerText = vinylsVal;
            document.getElementById('total-wishlists').innerText = wishVal;

            document.getElementById('filter-tags').innerHTML = (data.availableTags || []).map(t => `<button onclick="setFilter('${t.text}')" class="px-3 py-1 rounded-full text-xs ${currentFilter === t.text ? 'ring-2 ring-white' : ''}" style="background-color: ${t.color}">${t.text}</button>`).join('');

            const renderGrid = (key, id) => {
                let items = data[key] || [];
                if(key === 'wishlists' && currentFilter) items = items.filter(i => (i.tags || []).find(t => t.text === currentFilter));
                document.getElementById(id).innerHTML = items.map(i => {
                    const pos = i.imgPos === 'top' ? 'object-top' : i.imgPos === 'bottom' ? 'object-bottom' : 'object-center';
                    return `
                    <div class="glass p-6 rounded-3xl card-hover relative group">
                        <div class="w-full h-40 bg-white/5 rounded-2xl mb-4 overflow-hidden">
                            ${i.img ? `<img src="${i.img}" class="w-full h-full object-cover ${pos}">` : '<div class="h-full flex items-center justify-center opacity-20">Без фото</div>'}
                        </div>
                        <h3 class="font-bold truncate">${i.title} ${i.isGift ? '🎁' : ''}</h3>
                        <p class="text-cyan-400 font-mono text-sm">${i.price} ₴</p>
                        ${i.url ? `<a href="${i.url}" target="_blank" class="text-xs text-blue-400 hover:underline block mt-1">🔗 Ссылка</a>` : ''}
                        <div class="flex flex-wrap gap-1 mt-2">${(i.tags || []).map(t => `<span class="px-2 py-0.5 rounded text-[10px]" style="background-color: ${t.color}">${t.text}</span>`).join('')}</div>
                        <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="cyclePos('${key}', ${i.id})" class="bg-white/10 p-2 rounded-full">🔄</button>
                            <button onclick="openNote('${key}', ${i.id})" class="bg-white/10 p-2 rounded-full">💬</button>
                            <button onclick="openModal('${key}', ${i.id})" class="bg-white/10 p-2 rounded-full">✏️</button>
                            <button onclick="data['${key}'] = data['${key}'].filter(x => x.id !== ${i.id}); save();" class="bg-red-500/20 p-2 rounded-full">🗑️</button>
                        </div>
                    </div>`;
                }).join('');
            };
            
            renderGrid('cds', 'cd-grid'); renderGrid('vinyls', 'vinyl-grid'); renderGrid('wishlists', 'wishlist-grid');
            renderQuickNotes();
            const avatar = document.getElementById('main-avatar');
            if(data.avatar) { avatar.src = data.avatar; avatar.classList.remove('hidden'); }
        }
        updateUI();
    </script>
</body>
</html>
