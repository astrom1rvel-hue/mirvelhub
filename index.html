<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRVEL HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-dark: #050508; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-5px) scale(1.02); border-color: rgba(139, 92, 246, 0.5); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-black to-black">

    <nav class="w-64 p-8 flex flex-col gap-6 border-r border-white/5">
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 italic">MIRVEL HUB</h1>
        <div class="flex flex-col gap-2">
            <button onclick="showPage('home')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">🏠 Главная</button>
            <button onclick="showPage('cds')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">💿 CD Коллекция</button>
            <button onclick="showPage('vinyls')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">💽 Винил</button>
            <button onclick="showPage('wishlists')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">🎁 Желаемое</button>
            <button onclick="showPage('profile')" class="nav-btn text-left py-3 px-4 rounded-2xl hover:bg-white/5 transition">👤 Профиль</button>
        </div>
    </nav>

    <main class="flex-1 p-10 overflow-y-auto">
        <section id="home" class="fade-in">
            <div class="glass p-10 rounded-3xl mb-10 flex justify-between items-center">
                <div>
                    <h2 class="text-5xl font-black mb-4">Привет, <span id="display-name" class="text-cyan-400">Коллекционер</span>!</h2>
                    <p id="display-desc" class="text-gray-500 mb-6 italic">Здесь будет ваше описание...</p>
                    <p class="text-gray-400 text-lg">Уровень: <span id="user-lvl" class="text-purple-400 font-bold">1</span> | XP: <span id="user-xp" class="text-cyan-400 font-bold">0</span></p>
                </div>
                <img id="main-avatar" class="w-24 h-24 rounded-full border-4 border-purple-500/30 object-cover hidden">
            </div>

            <div class="grid grid-cols-2 gap-6 mb-10">
                <div class="glass p-8 rounded-3xl">
                    <p class="text-gray-500 text-sm font-bold uppercase tracking-wider">Всего в коллекции</p>
                    <h3 class="text-4xl font-black mt-2 text-purple-400" id="stat-col-val">0 ₴</h3>
                </div>
                <div class="glass p-8 rounded-3xl">
                    <p class="text-gray-500 text-sm font-bold uppercase tracking-wider">Желаемое</p>
                    <h3 class="text-4xl font-black mt-2 text-cyan-400" id="stat-wish-val">0 ₴</h3>
                </div>
            </div>

            <div class="mb-10">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold">Мои артисты</h2>
                    <div class="flex gap-2">
                        <input id="artist-input" placeholder="Имя артиста" class="bg-white/5 p-3 rounded-2xl border border-white/10 px-6 text-sm">
                        <button onclick="saveArtist()" class="bg-white text-black px-6 py-3 rounded-2xl font-bold hover:scale-105 transition-all text-sm">+ Добавить</button>
                    </div>
                </div>
                <div id="artists-grid" class="grid grid-cols-4 gap-4"></div>
            </div>
        </section>

        <section id="cds" class="hidden fade-in">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-4xl font-bold">CD Коллекция</h2>
                    <p class="text-gray-500">Сумма: <span id="total-cds" class="text-white font-bold">0</span> ₴</p>
                </div>
                <button onclick="openModal('cds')" class="bg-white text-black px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">+ Новый CD</button>
            </div>
            <div id="cd-grid" class="grid grid-cols-4 gap-6"></div>
        </section>
        
        <section id="vinyls" class="hidden fade-in">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-4xl font-bold">Винил</h2>
                    <p class="text-gray-500">Сумма: <span id="total-vinyls" class="text-white font-bold">0</span> ₴</p>
                </div>
                <button onclick="openModal('vinyls')" class="bg-white text-black px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">+ Новая пластинка</button>
            </div>
            <div id="vinyl-grid" class="grid grid-cols-4 gap-6"></div>
        </section>
        
        <section id="wishlists" class="hidden fade-in">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-4xl font-bold">Желаемое</h2>
                    <p class="text-gray-500">Сумма: <span id="total-wishlists" class="text-white font-bold">0</span> ₴</p>
                </div>
                <button onclick="openModal('wishlists')" class="bg-white text-black px-8 py-3 rounded-2xl font-bold hover:scale-105 transition-all">+ Добавить</button>
            </div>
            <div id="wishlist-grid" class="grid grid-cols-4 gap-6"></div>
        </section>

        <section id="profile" class="hidden fade-in">
            <h2 class="text-4xl font-bold mb-10">Настройки</h2>
            <div class="glass p-8 rounded-3xl max-w-lg space-y-6">
                <label class="block text-sm text-gray-400">Аватар</label>
                <input type="file" accept="image/*" onchange="processImage(event, 'avatar')" class="w-full bg-white/5 p-4 rounded-xl border border-white/10">
                <input id="profile-name" placeholder="Ваш никнейм" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white">
                <textarea id="profile-desc" placeholder="Короткое описание о себе" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white h-24"></textarea>
                <button onclick="saveProfile()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold hover:bg-cyan-500 transition-all">Сохранить профиль</button>
                <div class="pt-6 border-t border-white/10 space-y-4">
                    <button onclick="exportData()" class="w-full bg-purple-600 py-4 rounded-xl font-bold hover:bg-purple-500 transition-all">Экспорт бэкапа</button>
                    <input type="file" accept=".json" onchange="importData(event)" class="w-full bg-white/5 p-4 rounded-xl border border-dashed border-white/10 text-gray-400">
                </div>
            </div>
        </section>
    </main>

    <button onclick="openQuickNotes()" class="fixed bottom-8 right-8 w-16 h-16 bg-purple-600 rounded-full shadow-2xl flex items-center justify-center text-3xl hover:bg-purple-500 hover:scale-110 transition-all z-40">📝</button>

    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
        <div class="glass p-10 rounded-3xl w-96 space-y-4 shadow-2xl">
            <h2 class="text-2xl font-bold">Редактор</h2>
            <input type="hidden" id="edit-type"><input type="hidden" id="edit-id">
            <input id="item-title" placeholder="Название" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white">
            <input id="item-price" type="number" placeholder="Цена (₴)" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white">
            <input id="item-url" placeholder="Ссылка (URL)" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white hidden">
            <div class="flex items-center gap-2 text-sm">
                <input type="checkbox" id="item-gift" class="w-4 h-4 rounded border-white/10 bg-white/5">
                <label for="item-gift">Это подарок 🎁</label>
            </div>
            <input type="file" id="item-img" accept="image/*" onchange="processImage(event, 'temp')" class="w-full text-sm text-gray-400">
            <button onclick="saveItem()" class="w-full bg-purple-600 py-4 rounded-xl font-bold hover:bg-purple-500 transition-all">Сохранить</button>
            <button onclick="closeModal('modal')" class="w-full bg-white/10 py-4 rounded-xl">Отмена</button>
        </div>
    </div>

    <div id="note-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
        <div class="glass p-10 rounded-3xl w-96 space-y-4 shadow-2xl">
            <h2 class="text-2xl font-bold">Заметка</h2>
            <input type="hidden" id="note-type"><input type="hidden" id="note-id">
            <textarea id="note-text" class="w-full h-32 bg-white/5 p-4 rounded-xl border border-white/10 text-white"></textarea>
            <button onclick="saveNote()" class="w-full bg-purple-600 py-4 rounded-xl font-bold hover:bg-purple-500 transition-all">Сохранить</button>
            <button onclick="closeModal('note-modal')" class="w-full bg-white/10 py-4 rounded-xl">Закрыть</button>
        </div>
    </div>

    <div id="quick-notes-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
        <div class="glass p-8 rounded-3xl w-96 max-h-[80vh] flex flex-col space-y-4 shadow-2xl">
            <h2 class="text-2xl font-bold">Быстрые заметки</h2>
            <div id="quick-notes-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            <div class="flex gap-2">
                <input id="new-quick-note" class="flex-1 bg-white/5 p-3 rounded-xl border border-white/10" placeholder="Новая заметка...">
                <button onclick="saveQuickNote()" class="bg-purple-600 px-4 py-3 rounded-xl font-bold">+</button>
            </div>
            <button onclick="closeModal('quick-notes-modal')" class="w-full bg-white/10 py-3 rounded-xl">Закрыть</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('mirvel_data')) || {};
        const defaults = { cds: [], vinyls: [], wishlists: [], artists: [], name: 'Коллекционер', description: '', xp: 0, lvl: 1, avatar: '', tempImg: '', quickNotes: [] };
        data = { ...defaults, ...data };

        function calculateStats() {
            const cdsVal = (data.cds || []).reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
            const vinylsVal = (data.vinyls || []).reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
            const wishVal = (data.wishlists || []).reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
            
            data.xp = Math.floor((cdsVal + vinylsVal) / 10);
            data.lvl = Math.floor(data.xp / 500) + 1;
            
            return { cdsVal, vinylsVal, wishVal, totalCol: cdsVal + vinylsVal };
        }

        function save() { 
            calculateStats();
            localStorage.setItem('mirvel_data', JSON.stringify(data)); 
            updateUI();
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function processImage(event, target) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = target === 'avatar' ? 200 : 400;
                    const scale = Math.min(1, maxW / img.width);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    if (target === 'avatar') { data.avatar = base64; save(); }
                    else { data.tempImg = base64; }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.showPage = (id) => document.querySelectorAll('main > section').forEach(s => s.classList.toggle('hidden', s.id !== id));
        
        window.openModal = (type, id = null) => { 
            document.getElementById('edit-type').value = type; 
            document.getElementById('edit-id').value = id || '';
            document.getElementById('item-url').classList.toggle('hidden', type !== 'wishlists');
            data.tempImg = '';
            
            if(id) {
                const item = data[type].find(x => x.id === id);
                document.getElementById('item-title').value = item.title;
                document.getElementById('item-price').value = item.price;
                document.getElementById('item-url').value = item.url || '';
                document.getElementById('item-gift').checked = !!item.isGift;
                data.tempImg = item.img;
            } else {
                document.getElementById('item-title').value = '';
                document.getElementById('item-price').value = '';
                document.getElementById('item-url').value = '';
                document.getElementById('item-gift').checked = false;
            }
            document.getElementById('modal').classList.remove('hidden'); 
        };

        window.openNote = (type, id) => {
            document.getElementById('note-type').value = type;
            document.getElementById('note-id').value = id;
            const item = data[type].find(x => x.id === id);
            document.getElementById('note-text').value = item.note || '';
            document.getElementById('note-modal').classList.remove('hidden');
        };

        window.saveNote = () => {
            const type = document.getElementById('note-type').value;
            const id = parseInt(document.getElementById('note-id').value);
            const item = data[type].find(x => x.id === id);
            item.note = document.getElementById('note-text').value;
            save();
            closeModal('note-modal');
        };

        window.saveItem = async () => {
            const type = document.getElementById('edit-type').value;
            const id = parseInt(document.getElementById('edit-id').value);
            const title = document.getElementById('item-title').value;
            const price = parseFloat(document.getElementById('item-price').value) || 0;
            const url = document.getElementById('item-url').value;
            const isGift = document.getElementById('item-gift').checked;
            
            if(id) {
                const item = data[type].find(x => x.id === id);
                item.title = title; item.price = price; item.url = url; item.isGift = isGift;
                if(data.tempImg) item.img = data.tempImg;
            } else {
                data[type].push({ id: Date.now(), title, price, url, note: '', img: data.tempImg || '', pos: 'center', isGift });
            }
            save();
            closeModal('modal');
        };

        window.saveArtist = () => {
            const input = document.getElementById('artist-input');
            if(!input.value) return;
            data.artists.push({ id: Date.now(), name: input.value });
            input.value = '';
            save();
        };

        window.deleteItem = (key, id) => { data[key] = data[key].filter(x => x.id !== id); save(); };
        
        window.changePos = (key, id) => {
            const item = data[key].find(x => x.id === id);
            const posMap = { 'top': 'center', 'center': 'bottom', 'bottom': 'top' };
            item.pos = posMap[item.pos || 'center'];
            save();
        };

        window.saveProfile = () => { 
            data.name = document.getElementById('profile-name').value; 
            data.description = document.getElementById('profile-desc').value;
            save(); 
        };

        window.openQuickNotes = () => document.getElementById('quick-notes-modal').classList.remove('hidden');
        
        window.saveQuickNote = () => {
            const input = document.getElementById('new-quick-note');
            if(!input.value) return;
            data.quickNotes.push({ id: Date.now(), text: input.value });
            input.value = '';
            save();
        };

        window.deleteQuickNote = (id) => {
            data.quickNotes = data.quickNotes.filter(n => n.id !== id);
            save();
        };

        window.exportData = () => { 
            const a = document.createElement('a'); 
            a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data)); 
            a.download = 'mirvel_data.json'; a.click(); 
        };

        window.importData = (e) => { 
            const reader = new FileReader(); 
            reader.onload = (ev) => { 
                try {
                    const parsed = JSON.parse(ev.target.result);
                    data = { ...defaults, ...parsed };
                    save();
                } catch (err) { console.error(err); }
            }; 
            reader.readAsText(e.target.files[0]); 
        };

        window.updateUI = () => {
            const { cdsVal, vinylsVal, wishVal, totalCol } = calculateStats();
            
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-desc').innerText = data.description || 'Нет описания.';
            document.getElementById('user-xp').innerText = data.xp;
            document.getElementById('user-lvl').innerText = data.lvl;
            document.getElementById('stat-col-val').innerText = totalCol + ' ₴';
            document.getElementById('stat-wish-val').innerText = wishVal + ' ₴';
            
            document.getElementById('total-cds').innerText = cdsVal;
            document.getElementById('total-vinyls').innerText = vinylsVal;
            document.getElementById('total-wishlists').innerText = wishVal;
            
            document.getElementById('profile-name').value = data.name;
            document.getElementById('profile-desc').value = data.description;
            
            const avatar = document.getElementById('main-avatar');
            if(data.avatar) { avatar.src = data.avatar; avatar.classList.remove('hidden'); }
            
            const renderGrid = (key, id) => {
                document.getElementById(id).innerHTML = (data[key] || []).map(i => `
                    <div class="glass p-6 rounded-3xl card-hover relative group">
                        <div class="w-full h-40 bg-white/5 rounded-2xl mb-4 overflow-hidden">
                            ${i.img ? `<img src="${i.img}" class="w-full h-full object-cover" style="object-position: ${i.pos}">` : '<div class="h-full flex items-center justify-center text-white/10">Без фото</div>'}
                        </div>
                        <h3 class="font-bold text-lg truncate">${i.title} ${i.isGift ? '🎁' : ''}</h3>
                        <p class="text-cyan-400 font-mono mb-4">${i.price} ₴ ${i.url ? `<br><a href="${i.url}" target="_blank" class="text-xs text-white/50 hover:underline">Ссылка</a>` : ''}</p>
                        
                        <div class="absolute top-4 right-4 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="openNote('${key}', ${i.id})" class="bg-white/10 p-2 rounded-full hover:bg-yellow-500">💬</button>
                            <button onclick="openModal('${key}', ${i.id})" class="bg-white/10 p-2 rounded-full hover:bg-cyan-500">✏️</button>
                            <button onclick="changePos('${key}', ${i.id})" class="bg-white/10 p-2 rounded-full hover:bg-purple-500">🖼️</button>
                            <button onclick="deleteItem('${key}', ${i.id})" class="bg-red-500/20 p-2 rounded-full hover:bg-red-500">🗑️</button>
                        </div>
                    </div>
                `).join('');
            };

            const renderQuickNotes = () => {
                document.getElementById('quick-notes-list').innerHTML = (data.quickNotes || []).map(n => `
                    <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center text-sm">
                        <span>${n.text}</span>
                        <button onclick="deleteQuickNote(${n.id})" class="text-white/20 hover:text-red-400">✕</button>
                    </div>
                `).join('');
            };

            const renderArtists = () => {
                document.getElementById('artists-grid').innerHTML = (data.artists || []).map(a => `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <span class="font-bold text-sm truncate">🎤 ${a.name}</span>
                        <button onclick="deleteItem('artists', ${a.id})" class="text-white/20 hover:text-red-400 ml-2">✕</button>
                    </div>
                `).join('');
            };

            renderGrid('cds', 'cd-grid');
            renderGrid('vinyls', 'vinyl-grid');
            renderGrid('wishlists', 'wishlist-grid');
            renderArtists();
            renderQuickNotes();
        };
        updateUI();
    </script>
</body>
</html>
